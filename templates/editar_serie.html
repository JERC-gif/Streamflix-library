{% extends "base.html" %}

{% block content %}
<div class="container">
    <h2 class="section-title">Editar Serie</h2>
    
    <div class="form-section">
        <form method="POST" action="{{ url_for('editar_serie', id=serie[0]) }}">
            <div class="form-group">
                <label for="nombre">Nombre:</label>
                <input type="text" id="nombre" name="nombre" value="{{ serie[1] }}" required>
            </div>
            
            <div class="form-row">
                <div class="form-group">
                    <label for="anio">Año:</label>
                    <input type="number" id="anio" name="anio" min="1900" max="2100" value="{{ serie[2] if serie[2] else '' }}">
                </div>
                
                <div class="form-group">
                    <label for="calificacion">Calificación (0-10):</label>
                    <input type="number" id="calificacion" name="calificacion" min="0" max="10" step="0.1" value="{{ serie[3] if serie[3] else '' }}">
                </div>
                
                <div class="form-group">
                    <label for="fecha_terminado">Fecha terminada:</label>
                    <input type="date" id="fecha_terminado" name="fecha_terminado" value="{{ serie[4] if serie[4] else '' }}">
                </div>
            </div>
            
            <div class="form-actions">
                <button type="submit" class="btn btn-primary">Guardar Cambios</button>
                <a href="{{ url_for('series') }}" class="btn btn-secondary">Cancelar</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
